<!-- Weighted Name Display System -->
<script>
function displayName() {
    const names = ['RANDY', 'BANDY', 'SANDY', 'ANDY'];
    const weightedNames = [];
    for (let i = 0; i < 100; i++) {
        weightedNames.push('RANDY'); // 85% chance
    }
    for (let i = 0; i < 15; i++) {
        weightedNames.push('ANDY'); // 15% chance
    }

    const randomIndex = Math.floor(Math.random() * weightedNames.length);
    document.getElementById('nameDisplay').innerText = weightedNames[randomIndex];
}

setInterval(displayName, 2000);

setInterval(() => {
    document.getElementById('fullNameDisplay').innerText = 'ANDY';
}, 10000);
</script>
<div id='nameDisplay'></div>
<div id='fullNameDisplay'></div>
